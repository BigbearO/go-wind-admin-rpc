version: v2

clean: true

managed:
  enabled: true

  disable:
    - module: buf.build/googleapis/googleapis
    - module: 'buf.build/envoyproxy/protoc-gen-validate'
    - module: 'buf.build/kratos/apis'
    - module: 'buf.build/gnostic/gnostic'
    - module: 'buf.build/gogo/protobuf'
    - module: 'buf.build/tx7do/pagination'
    - module: 'buf.build/menta2k-org/redact'

  override:
    - file_option: go_package_prefix
      value: github.com/tx7do/go-wind-admin-rpc/gen/go

    - file_option: go_package
      path: admin/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/admin/service/v1;adminpb
    - file_option: go_package
      path: audit/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/audit/service/v1;auditpb
    - file_option: go_package
      path: authentication/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/authentication/service/v1;authenticationpb
    - file_option: go_package
      path: dict/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/dict/service/v1;dictpb
    - file_option: go_package
      path: storage/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/storage/service/v1;storagepb
    - file_option: go_package
      path: internal_message/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/internal_message/service/v1;internalmessagepb
    - file_option: go_package
      path: permission/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/permission/service/v1;permissionpb
    - file_option: go_package
      path: task/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/task/service/v1;taskpb
    - file_option: go_package
      path: identity/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/identity/service/v1;identitypb
    - file_option: go_package
      path: resource/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/resource/service/v1;resourcepb
    - file_option: go_package
      path: game/service/v1
      value: github.com/tx7do/go-wind-admin-rpc/gen/go/game/service/v1;gamepb

plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative

  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-http
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-go-errors
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-validate
    out: gen/go
    opt:
      - paths=source_relative
      - lang=go

  - local: protoc-gen-redact
    out: gen/go
    opt:
      - paths=source_relative
      - lang=go
